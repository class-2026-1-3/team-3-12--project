<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>로그인</title>

    <link rel="stylesheet" href="../css/real_common.css">
    <link rel="stylesheet" href="../css/real_login.css">
</head>

<body>

    <div class="login-container">

        <div class="login-box">

            <h1>로그인</h1>

            <input
                type="text"
                id="id"
                placeholder="아이디">

            <input
                type="password"
                id="pw"
                placeholder="비밀번호">

            <button onclick="login()">
                로그인
            </button>

            <p id="message"></p>

        </div>

    </div>


</body>

</html>
